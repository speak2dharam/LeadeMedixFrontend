<div class="p-3">
  <app-datatable
    title="Users"
    [columns]="columns"
    [rows]="users()"
    [loading]="loading()"
    [error]="error()"
    [query]="query()"
    [totalRecords]="totalRecords()"
    [totalPages]="totalPages()"
    [searchPlaceholder]="'Search users...'"
    (queryChange)="onQueryChange($event)"
  >
    <ng-template #rowTemplate let-user>
      <tr>
        <td>{{ fullName(user) }}</td>
        <td>{{ user.email || '-' }}</td>
        <td>{{ user.mobile || '-' }}</td>
        <td>
          <span class="badge" [class.text-bg-success]="user.isActive" [class.text-bg-secondary]="!user.isActive">
            {{ user.isActive ? 'Yes' : 'No' }}
          </span>
        </td>
      </tr>
    </ng-template>
  </app-datatable>
</div>
