<header class="header d-flex justify-content-between align-items-center px-3 border-bottom">
  <div class="d-flex align-items-center gap-3">
    <button class="menu-toggle-btn d-lg-none" type="button" (click)="menuToggle.emit()">
      <i class="bi bi-list"></i>
    </button>
    <h4 class="brand-title mb-0">Unifycloud</h4>
  </div>

  <div class="header-actions">
    <div class="position-relative">
      <button class="action-btn" type="button" (click)="toggleNotifications()" aria-label="Notifications">
        <i class="bi bi-bell-fill"></i>
        @if (unreadCount() > 0) {
          <span class="notify-dot"></span>
        }
      </button>

      @if (notificationsOpen()) {
        <div class="panel-dropdown notification-dropdown">
          <div class="panel-header">
            <h6 class="m-0">Notifications</h6>
            <small>{{ notifications.length }} recent</small>
          </div>
          <ul class="list-unstyled m-0">
            @for (item of notifications; track item) {
              <li>{{ item }}</li>
            }
          </ul>
        </div>
      }
    </div>

    <div class="position-relative">
      <button class="profile-trigger" type="button" (click)="toggleProfile()">
        <img src="assets/img/svg/user.svg" alt="User" />
      </button>

      @if (profileOpen()) {
        <div class="panel-dropdown profile-dropdown">
          <div class="profile-top">
            <img src="assets/img/svg/user.svg" alt="Profile" />
            <div>
              <h6 class="m-0">{{ userName() }}</h6>
              <small>{{ userEmail() || 'No email available' }}</small>
            </div>
          </div>

          <div class="action-grid">
            <button type="button"><i class="bi bi-person"></i>My Profile</button>
            <button type="button"><i class="bi bi-gear"></i>Settings</button>
            <button type="button"><i class="bi bi-shield-lock"></i>Change Password</button>
            <button type="button"><i class="bi bi-question-circle"></i>Help</button>
          </div>

          <button class="logout-btn" type="button" (click)="logout()">
            <i class="bi bi-box-arrow-right"></i>
            <span>Sign Out</span>
          </button>
        </div>
      }
    </div>
  </div>
</header>
